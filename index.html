<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tendy - ارائه سبد محصولی</title>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #33a7b5; --dark: #13232f; }
    body { font-family: 'Vazirmatn', sans-serif; margin: 0; background: #0f172a; color: white; overflow: hidden; }
    .slide { 
      position: absolute; 
      width: 100%; 
      height: 100vh; 
      display: none; 
      align-items: center; 
      justify-content: center; 
      text-align: center; 
      padding: 60px; 
      background-size: cover; 
      background-position: center; 
    }
    .slide.active { display: flex; animation: fadeIn 0.8s; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    h1 { font-size: 4.2rem; margin-bottom: 20px; }
    p { font-size: 1.6rem; max-width: 800px; margin: 0 auto; }
    .nav { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); padding: 12px 25px; border-radius: 50px; display: flex; gap: 15px; }
    .nav button { background: none; border: none; color: white; font-size: 1.4rem; cursor: pointer; padding: 10px 18px; border-radius: 50%; }
    .nav button:hover { background: rgba(255,255,255,0.2); }
  </style>
</head>
<body>
  <!-- اسلاید ۱ -->
  <div class="slide active" style="background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://source.unsplash.com/random/1920x1080/?modern-home');">
    <div>
      <h1>Tendy</h1>
      <p style="font-size:2rem">سبد محصولی شبکه فروش هوشمند خانه</p>
      <p style="margin-top:40px;opacity:0.9">ارائه به مدیر ارشد • ۱۴۰۵</p>
    </div>
  </div>

  <!-- اسلاید ۲ -->
  <div class="slide" style="background: #13232f;">
    <div>
      <h1>چشم‌انداز تندی</h1>
      <p>دمو در منزل • تجربه خرید متفاوت • فروش مستقیم هوشمند</p>
    </div>
  </div>

  <!-- اسلاید ۳ -->
  <div class="slide" style="background: linear-gradient(#33a7b5, #1e6b7a);">
    <div>
      <h1>دسته‌بندی محصولات</h1>
      <p>🏠 Home & Kitchen<br>💄 Beauty & Personal Care<br>🧘 Health & Wellness</p>
    </div>
  </div>

  <!-- اسلاید ۴ -->
  <div class="slide" style="background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://source.unsplash.com/random/1920x1080/?airfryer');">
    <div>
      <h1>ستاره لاین</h1>
      <p style="font-size:2.5rem">سرخ‌کن بدون روغن</p>
      <p>دمو سریع • فروش بالا • رضایت مشتری</p>
    </div>
  </div>

  <div class="nav">
    <button onclick="prevSlide()">→</button>
    <button onclick="nextSlide()">←</button>
  </div>

  <script>
    let current = 0;
    const slides = document.querySelectorAll('.slide');

    function showSlide(n) {
      slides.forEach(s => s.classList.remove('active'));
      slides[n].classList.add('active');
    }

    function nextSlide() {
      current = (current + 1) % slides.length;
      showSlide(current);
    }

    function prevSlide() {
      current = (current - 1 + slides.length) % slides.length;
      showSlide(current);
    }

    // کلیدهای کیبورد
    document.addEventListener('keydown', e => {
      if (e.key === "ArrowRight") nextSlide();
      if (e.key === "ArrowLeft") prevSlide();
    });
  </script>
</body>
</html>
