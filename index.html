<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tendy - لاین محصولات</title>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #33a7b5; --dark: #2c3e50; }
    body { font-family: 'Vazirmatn', sans-serif; margin: 0; background: #f8f9fa; color: #2c3e50; }
    .hero { 
      background: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)), url('https://source.unsplash.com/random/1600x900/?modern-kitchen') center/cover no-repeat; 
      height: 85vh; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      text-align: center; 
      color: white; 
      position: relative;
    }
    .hero-content { z-index: 2; }
    h1 { font-size: 4rem; margin: 0; text-shadow: 0 4px 20px rgba(0,0,0,0.6); }
    .subtitle { font-size: 1.6rem; margin: 15px 0 40px; }
    .section { padding: 90px 20px; max-width: 1300px; margin: 0 auto; }
    .products { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
    .card { 
      background: white; 
      border-radius: 24px; 
      overflow: hidden; 
      box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
      transition: all 0.4s ease; 
    }
    .card:hover { transform: translateY(-20px); box-shadow: 0 25px 50px rgba(51,167,181,0.25); }
    .card img { width: 100%; height: 240px; object-fit: cover; }
    .card-content { padding: 28px; }
    .category { color: var(--primary); font-weight: 700; font-size: 1.1rem; }
    .btn { 
      background: var(--primary); 
      color: white; 
      padding: 14px 36px; 
      border-radius: 50px; 
      text-decoration: none; 
      display: inline-block; 
      margin-top: 20px; 
      font-weight: 600; 
    }
    footer { 
      background: var(--dark); 
      color: white; 
      padding: 60px 20px 30px; 
      text-align: center; 
    }
    .logo { max-height: 70px; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="hero">
    <div class="hero-content">
      <h1>Tendy</h1>
      <p class="subtitle">شبکه فروش هوشمند خانه • خدمات جامع انتخاب</p>
    </div>
  </div>

  <div class="section">
    <h2 style="text-align:center; color:var(--primary); margin-bottom:50px; font-size:2.4rem;">لاین محصولات قابل دمو در منزل</h2>
    <div class="products">
      <div class="card">
        <img src="https://source.unsplash.com/random/600x400/?airfryer" alt="سرخ‌کن">
        <div class="card-content">
          <div class="category">آشپزخانه</div>
          <h3>سرخ‌کن بدون روغن</h3>
          <p>دمو سریع و جذاب برای سبک زندگی سالم</p>
          <a href="#" class="btn">جزئیات محصول</a>
        </div>
      </div>
      <!-- کارت‌های بیشتر اضافه می‌کنیم -->
    </div>
  </div>

  <footer>
    <img src="https://www.entekhabservice.com/wp-content/uploads/2025/08/%D9%84%D9%88%DA%AF%D9%88-%D9%84%D8%A7%D8%AA%DB%8C%D9%86-300x169.png" alt="هلدینگ خدمات جامع انتخاب" class="logo">
    <p>زیرمجموعه هلدینگ خدمات جامع انتخاب</p>
  </footer>
</body>
</html>
